<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HP Ordträning</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #17202a;
      --muted: #5f6c7b;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --good-bg: #e8f7ee;
      --good-border: #1f9d55;
      --bad-bg: #fdecec;
      --bad-border: #d93025;
      --neutral: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 22px;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .sub { color: var(--muted); margin: 0; }
    .topbar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 18px;
    }
    .pill {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      font-size: 14px;
    }
    .pill strong { display: block; font-size: 22px; margin-top: 4px; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    .primary {
      background: var(--primary);
      color: white;
    }
    .primary:hover { background: var(--primary-2); }
    .secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }
    .secondary:hover { background: #e0e7ff; }
    .ghost {
      background: #f3f4f6;
      color: #111827;
    }
    .question-word {
      font-size: 34px;
      font-weight: 700;
      margin: 8px 0 6px;
    }
    .question-text { color: var(--muted); margin-bottom: 14px; }
    .answers {
      display: grid;
      gap: 12px;
    }
    .answer {
      border: 2px solid var(--neutral);
      background: white;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      text-align: left;
      font-size: 17px;
      width: 100%;
    }
    .answer:hover { border-color: #93c5fd; }
    .answer.correct {
      background: var(--good-bg);
      border-color: var(--good-border);
    }
    .answer.wrong {
      background: var(--bad-bg);
      border-color: var(--bad-border);
    }
    .answer:disabled { cursor: default; }
    .feedback {
      margin-top: 14px;
      border-radius: 12px;
      padding: 14px;
      display: none;
    }
    .feedback.good {
      display: block;
      background: var(--good-bg);
      border: 1px solid #b7e4c7;
    }
    .feedback.bad {
      display: block;
      background: var(--bad-bg);
      border: 1px solid #f5c2c0;
    }
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .small { color: var(--muted); font-size: 14px; }
    .hidden { display: none; }
    .review-item {
      border-top: 1px solid #e5e7eb;
      padding: 12px 0;
    }
    .review-item:first-child { border-top: 0; }
    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .tag.good { background: var(--good-bg); color: #166534; }
    .tag.bad { background: var(--bad-bg); color: #991b1b; }
    @media (max-width: 640px) {
      .topbar { grid-template-columns: repeat(2, 1fr); }
      .question-word { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>HP Ordträning</h1>
      <p class="sub">Träna svenska svåra ord med direkt rättning. Klicka på ett svar och se facit direkt.</p>
      <div class="topbar">
        <div class="pill">Fråga<strong id="qnum">1 / 10</strong></div>
        <div class="pill">Poäng<strong id="score">0</strong></div>
        <div class="pill">Rätt<strong id="correctCount">0</strong></div>
        <div class="pill">Bästa<strong id="best">0</strong></div>
      </div>
      <div class="controls">
        <button class="primary" id="startBtn">Starta quiz</button>
        <button class="secondary" id="restartBtn">Blanda om</button>
        <button class="ghost" id="showWordsBtn">Visa ordlista</button>
      </div>
    </div>

    <div class="card hidden" id="quizCard">
      <div class="small" id="category">HP-ord</div>
      <div class="question-word" id="word">avse</div>
      <div class="question-text">Vilket ord betyder ungefär samma sak?</div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
      <div class="footer-row">
        <div class="small" id="progressText">Välj ett svar för att se facit direkt.</div>
        <button class="primary hidden" id="nextBtn">Nästa fråga</button>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2>Klart!</h2>
      <p id="resultText"></p>
      <div id="review"></div>
      <div class="controls">
        <button class="primary" id="playAgainBtn">Kör igen</button>
      </div>
    </div>

    <div class="card hidden" id="wordListCard">
      <h2>Ordlista</h2>
      <p class="sub">Bra att läsa före eller efter quizet.</p>
      <div id="wordList"></div>
    </div>
  </div>

  <script>
    const questionBank = [
      { word: 'avse', correct: 'mena', explanation: 'Att avse betyder ungefär att mena eller handla om.', options: ['mena', 'vänta', 'förstöra', 'glömma'] },
      { word: 'föreligga', correct: 'finnas', explanation: 'Föreligga betyder att något finns eller existerar.', options: ['försvinna', 'finnas', 'avbrytas', 'beslutas'] },
      { word: 'vidta', correct: 'göra', explanation: 'Vidta används ofta i uttryck som att vidta åtgärder, alltså göra något.', options: ['göra', 'undvika', 'minnas', 'räkna'] },
      { word: 'påtaglig', correct: 'tydlig', explanation: 'Påtaglig betyder tydlig, märkbar eller klart kännbar.', options: ['osäker', 'tydlig', 'ovanlig', 'hemlig'] },
      { word: 'vederlägga', correct: 'motbevisa', explanation: 'Vederlägga betyder att visa att något inte stämmer.', options: ['förklara', 'motbevisa', 'förkorta', 'samla'] },
      { word: 'hänseende', correct: 'aspekt', explanation: 'I detta hänseende betyder ungefär i denna aspekt eller synpunkt.', options: ['ordning', 'regel', 'aspekt', 'orsak'] },
      { word: 'vedertagen', correct: 'accepterad', explanation: 'Vedertagen betyder allmänt accepterad eller etablerad.', options: ['förbjuden', 'okänd', 'accepterad', 'störd'] },
      { word: 'försumma', correct: 'inte göra det man borde', explanation: 'Försumma betyder att man låter bli att göra något viktigt.', options: ['förbättra', 'inte göra det man borde', 'förklara noggrant', 'fördubbla'] },
      { word: 'föga', correct: 'lite', explanation: 'Föga betyder lite eller i liten grad.', options: ['mycket', 'snabbt', 'lite', 'sent'] },
      { word: 'alstra', correct: 'skapa', explanation: 'Alstra betyder skapa eller producera.', options: ['dölja', 'skapa', 'sänka', 'överge'] },
      { word: 'tillta', correct: 'öka', explanation: 'Tillta betyder att öka eller bli starkare.', options: ['öka', 'försvinna', 'vända', 'vilja'] },
      { word: 'hävda', correct: 'påstå', explanation: 'Hävda betyder ofta att bestämt påstå något.', options: ['glömma', 'påstå', 'rita', 'låna'] },
      { word: 'väsentlig', correct: 'viktig', explanation: 'Väsentlig betyder viktig eller betydelsefull.', options: ['viktig', 'onödig', 'tom', 'mjuk'] },
      { word: 'bristfällig', correct: 'ofullständig', explanation: 'Bristfällig betyder att något inte är tillräckligt bra eller komplett.', options: ['ofullständig', 'perfekt', 'dyrbar', 'långsam'] },
      { word: 'undantag', correct: 'något som inte följer regeln', explanation: 'Undantag är något som avviker från det vanliga.', options: ['något som inte följer regeln', 'en bekräftelse', 'en fördel', 'en början'] },
      { word: 'beakta', correct: 'ta hänsyn till', explanation: 'Beakta betyder att man tar hänsyn till något.', options: ['ta hänsyn till', 'blunda för', 'städa bort', 'avsluta'] },
      { word: 'främja', correct: 'gynna', explanation: 'Främja betyder att gynna eller hjälpa något att utvecklas.', options: ['stoppa', 'gynna', 'ifrågasätta', 'dölja'] },
      { word: 'avsaknad', correct: 'brist på', explanation: 'Avsaknad betyder att något saknas.', options: ['överflöd av', 'brist på', 'nytta med', 'rädsla för'] },
      { word: 'uppenbar', correct: 'tydlig', explanation: 'Uppenbar betyder tydlig eller självklar.', options: ['hemlig', 'tydlig', 'ovanlig', 'tveksam'] },
      { word: 'omfatta', correct: 'inkludera', explanation: 'Omfatta betyder bland annat att innehålla eller inkludera.', options: ['förkasta', 'inkludera', 'fördröja', 'föreslå'] }
    ];

    let quiz = [];
    let current = 0;
    let score = 0;
    let correctCount = 0;
    let answered = false;
    let reviewLog = [];

    const el = id => document.getElementById(id);

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function loadBest() {
      el('best').textContent = localStorage.getItem('hp_best_score') || '0';
    }

    function updateStats() {
      el('score').textContent = score;
      el('correctCount').textContent = correctCount;
      el('qnum').textContent = `${Math.min(current + 1, quiz.length)} / ${quiz.length || 10}`;
    }

    function buildWordList() {
      const list = questionBank
        .map(q => `<div class="review-item"><strong>${q.word}</strong> = ${q.correct}<br><span class="small">${q.explanation}</span></div>`)
        .join('');
      el('wordList').innerHTML = list;
    }

    function initQuiz() {
      quiz = shuffle(questionBank).slice(0, 10).map(q => ({ ...q, options: shuffle(q.options) }));
      current = 0;
      score = 0;
      correctCount = 0;
      answered = false;
      reviewLog = [];
      el('resultCard').classList.add('hidden');
      el('quizCard').classList.remove('hidden');
      updateStats();
      renderQuestion();
    }

    function renderQuestion() {
      const q = quiz[current];
      answered = false;
      el('word').textContent = q.word;
      el('feedback').className = 'feedback';
      el('feedback').innerHTML = '';
      el('nextBtn').classList.add('hidden');
      el('progressText').textContent = 'Välj ett svar för att se facit direkt.';
      const answers = el('answers');
      answers.innerHTML = '';
      q.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'answer';
        btn.textContent = option;
        btn.addEventListener('click', () => answerQuestion(option, btn));
        answers.appendChild(btn);
      });
      updateStats();
    }

    function answerQuestion(selected, selectedBtn) {
      if (answered) return;
      answered = true;
      const q = quiz[current];
      const buttons = [...document.querySelectorAll('.answer')];
      const isCorrect = selected === q.correct;

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === q.correct) btn.classList.add('correct');
        if (btn === selectedBtn && !isCorrect) btn.classList.add('wrong');
      });

      if (isCorrect) {
        score += 1;
        correctCount += 1;
        el('feedback').className = 'feedback good';
        el('feedback').innerHTML = `<strong>Rätt!</strong><br>${q.explanation}`;
        reviewLog.push({ word: q.word, yourAnswer: selected, correct: q.correct, ok: true, explanation: q.explanation });
      } else {
        el('feedback').className = 'feedback bad';
        el('feedback').innerHTML = `<strong>Inte riktigt.</strong><br>Rätt svar är <strong>${q.correct}</strong>.<br>${q.explanation}`;
        reviewLog.push({ word: q.word, yourAnswer: selected, correct: q.correct, ok: false, explanation: q.explanation });
      }

      updateStats();
      el('progressText').textContent = current === quiz.length - 1 ? 'Sista frågan är rättad.' : 'Nu kan du gå vidare till nästa fråga.';
      el('nextBtn').classList.remove('hidden');
    }

    function nextQuestion() {
      if (current < quiz.length - 1) {
        current += 1;
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      el('quizCard').classList.add('hidden');
      el('resultCard').classList.remove('hidden');
      el('qnum').textContent = `${quiz.length} / ${quiz.length}`;
      const previousBest = Number(localStorage.getItem('hp_best_score') || 0);
      if (score > previousBest) {
        localStorage.setItem('hp_best_score', String(score));
      }
      loadBest();
      el('resultText').innerHTML = `Du fick <strong>${score} av ${quiz.length}</strong> rätt.`;
      el('review').innerHTML = reviewLog.map(item => `
        <div class="review-item">
          <span class="tag ${item.ok ? 'good' : 'bad'}">${item.ok ? 'Rätt' : 'Fel'}</span>
          <div><strong>${item.word}</strong></div>
          <div class="small">Ditt svar: ${item.yourAnswer}</div>
          <div class="small">Rätt svar: ${item.correct}</div>
          <div class="small">${item.explanation}</div>
        </div>
      `).join('');
    }

    el('startBtn').addEventListener('click', initQuiz);
    el('restartBtn').addEventListener('click', initQuiz);
    el('nextBtn').addEventListener('click', nextQuestion);
    el('playAgainBtn').addEventListener('click', initQuiz);
    el('showWordsBtn').addEventListener('click', () => {
      el('wordListCard').classList.toggle('hidden');
    });

    buildWordList();
    loadBest();
  </script>
</body>
</html>
